name: Deploy to FTP

on:
  push:
    branches:
      - claude/supabase-mcp-ftp-deploy-w585vm
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build:ftp
        env:
          VITE_SUPABASE_URL: https://miszggfikfioehokhuzk.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pc3pnZ2Zpa2Zpb2Vob2todXprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MDMyNDQsImV4cCI6MjA5ODE3OTI0NH0.Qi9QsZZRfjBH3ljFRFsA-ZPs0gD7ogutUDBIi9ePFag

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          state-name: .ftp-deploy-sync-state.json

      - name: Rename htaccess to .htaccess via LFTP
        run: |
          echo "Attempting to rename htaccess to .htaccess via LFTP..."
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          cd /public_html/
          rename htaccess .htaccess
          bye
          EOF
        continue-on-error: true
